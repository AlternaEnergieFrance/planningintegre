// ═══════════════════════════════════════════════════════════════
// CANAL VIEW
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// CANAL VIEW — div-based architecture (mirrors Timeline: sticky
// header rows + sticky label column + absolute-positioned content
// inside a single relative grid-cell per row). This guarantees
// uniform week columns, continuous vertical grid lines on every
// row, and lets overlapping bubbles stack freely without ever
// being artificially split.
// ═══════════════════════════════════════════════════════════════
function renderCanalView() {
  const d = data();
  const root = document.getElementById('canal-scroll-root');
  root.innerHTML = '';

  const grid = GRID || buildGrid(STATE.currentYear, STATE.activeScale);
  const isMonth = grid.scale === 'month';
  const totalPx = grid.totalDays * grid.dayPx;
  const today = new Date();
  const todayDay = Math.round((today - grid.start)/864e5);
  const DAY_NAMES = ['Di','Lu','Ma','Me','Je','Ve','Sa'];

  // ── HEADER ROWS (sticky top, same dayPx scale as Timeline) ──
  const scaleLabel = grid.scale==='q' ? ` · ${grid.quarters.map(q=>q.label).join('/')}` :
                     isMonth ? ` · ${grid.months[0]?.label||''}` : '';
  const labelTitle = 'Canal' + scaleLabel;

  function buildCvHeaderRow(id, stickyTop, labelText, cells) {
    const row = ce('div','canal-header-row');
    row.id = id;
    row.style.top = stickyTop + 'px';
    row.style.width = (150 + totalPx) + 'px';
    const lbl = ce('div','cv-label-col');
    lbl.textContent = labelText || '';
    row.appendChild(lbl);
    const cellsWrap = ce('div','header-cells');
    cellsWrap.style.width = totalPx + 'px';
    cells.forEach(c => cellsWrap.appendChild(c));
    row.appendChild(cellsWrap);
    return row;
  }

  // Q row
  const qCells = grid.quarters.map(q => {
    const days = Math.round((q.end - q.start)/864e5) + 1;
    const cls = 'canal-week-cell' + (grid.scale!=='year' ? (q.inRange ? '' : '') : '');
    const c = ce('div', cls);
    c.style.width = (days*grid.dayPx) + 'px';
    c.textContent = q.label;
    if(grid.scale==='q') c.style.opacity = q.inRange ? '1' : '0.5';
    return c;
  });
  root.appendChild(buildCvHeaderRow('cv-hrow-q', 0, labelTitle, qCells));

  // M row
  const mCells = grid.months.map(m => {
    const c = ce('div','canal-week-cell');
    c.style.width = (m.days*grid.dayPx) + 'px';
    c.textContent = m.label.toUpperCase();
    if(grid.scale!=='year') c.style.opacity = m.inRange ? '1' : '0.5';
    return c;
  });
  root.appendChild(buildCvHeaderRow('cv-hrow-m', 22, '', mCells));

  // W row (or D row in month view)
  if(isMonth) {
    const dCells = [];
    let dd = new Date(grid.start);
    for(let i=0; i<grid.totalDays; i++) {
      const isT = i===todayDay;
      const isWE = dd.getDay()===0||dd.getDay()===6;
      const c = ce('div','canal-day-cell'+(isWE?' weekend':''));
      c.style.width = grid.dayPx+'px';
      if(isT) c.style.background = 'rgba(84,216,156,0.2)';
      c.innerHTML = `<span style="font-weight:700">${dd.getDate()}</span><span style="opacity:0.6;font-size:8px">${DAY_NAMES[dd.getDay()]}</span>`;
      dCells.push(c);
      dd = addDays(dd,1);
    }
    root.appendChild(buildCvHeaderRow('cv-hrow-w', 44, '', dCells));
  } else {
    const wCells = grid.weeks.map(w => {
      const isT = todayDay>=w.startDay && todayDay<w.startDay+w.days;
      const c = ce('div','canal-week-cell' + (isT?' today-col':''));
      c.style.width = (w.days*grid.dayPx)+'px';
      if(w.days*grid.dayPx > 14) c.textContent = w.label;
      if(grid.scale!=='year') c.style.opacity = w.inRange ? '1' : '0.5';
      return c;
    });
    root.appendChild(buildCvHeaderRow('cv-hrow-w', 44, '', wCells));
  }

  // ── DATA ROWS ──
  function buildBgStripes(cellEl) {
    grid.months.forEach(m => {
      const stripe = ce('div','cv-week-stripe');
      stripe.style.left = (m.startDay*grid.dayPx)+'px';
      stripe.style.width = (m.days*grid.dayPx)+'px';
      cellEl.appendChild(stripe);
    });
    if(isMonth) {
      for(let i=0;i<grid.totalDays;i++) {
        const dt = addDays(grid.start, i);
        if(dt.getDay()===0||dt.getDay()===6) {
          const s = ce('div','cv-week-stripe weekend');
          s.style.left = (i*grid.dayPx)+'px';
          s.style.width = grid.dayPx+'px';
          cellEl.appendChild(s);
        }
      }
    }
    if(todayDay>=0 && todayDay<grid.totalDays) {
      const s = ce('div','cv-week-stripe');
      s.style.left = (todayDay*grid.dayPx)+'px';
      s.style.width = grid.dayPx+'px';
      s.style.background = 'rgba(84,216,156,0.08)';
      s.style.borderRight = '1px solid rgba(84,216,156,0.4)';
      cellEl.appendChild(s);
    }
  }

  function makeDataRow(extraCls, labelHtml, minH) {
    const row = ce('div','cv-data-row'+(extraCls?' '+extraCls:''));
    row.style.width = (150 + totalPx) + 'px';
    if(minH) row.style.minHeight = minH+'px';
    const lbl = ce('div','cv-label-col');
    lbl.innerHTML = labelHtml;
    row.appendChild(lbl);
    const cell = ce('div','cv-grid-cell');
    cell.style.width = totalPx + 'px';
    buildBgStripes(cell);
    row.appendChild(cell);
    return { row, lbl, cell };
  }

  // ── EVENTS ROW (Saisonnalité) ──
  if(STATE.displayOpts.showSeason) {
    const { row, lbl, cell } = makeDataRow('cv-season-row', '<span>🗓</span><span>Événements</span>', 44);

    // Periods: same dateToX/durationToPx as Timeline → one continuous pill, no splitting
    const periods = d.periods||[];
    const pLevels = [];
    periods.forEach(p => {
      const x1 = dateToX(p.start, grid);
      const w = durationToPx(p.start, p.end, grid);
      if(x1 > totalPx || x1+w < 0) return;
      let level = 0;
      while(pLevels[level] && pLevels[level] > x1) level++;
      pLevels[level] = x1 + w;
      const el = ce('div','cv-period-pill');
      el.style.cssText = `left:${x1}px;width:${Math.max(20,w)}px;top:${4+level*26}px;background:${p.color||'#94a3b8'};color:${isContrastDark(p.color||'#94a3b8')?'#000':'#fff'}`;
      el.textContent = p.title;
      el.title = `${p.title} (${fmtDate(p.start)} → ${fmtDate(p.end)})`;
      el.onclick = () => openPeriodModal(p, !STATE.isAdmin);
      if(STATE.isAdmin) el.addEventListener('contextmenu', ev => { ev.preventDefault(); openPeriodModal(p); });
      cell.appendChild(el);
    });

    // Milestones — same visual treatment as Timeline (round badge + dashed line)
    (d.milestones||[]).forEach(m => {
      const x = dateToX(m.date, grid) + grid.dayPx/2;
      if(x<0||x>totalPx) return;
      const el = ce('div','milestone-marker');
      el.style.left = x+'px';
      el.style.top = (4 + pLevels.length*26) + 'px';
      const icon = ce('div','milestone-icon', m.icon||'📌');
      icon.title = `${m.title} (${fmtDate(m.date)})`;
      el.appendChild(icon);
      el.onclick = () => openMilestoneModal(m, !STATE.isAdmin);
      cell.appendChild(el);
    });

    const seasonH = 44 + Math.max(0, pLevels.length-1)*26 + 28;
    row.style.minHeight = seasonH+'px';
    lbl.style.minHeight = seasonH+'px';
    cell.style.minHeight = seasonH+'px';
    root.appendChild(row);

    // Dashed vertical lines for milestones — same as Timeline
    (d.milestones||[]).forEach(m => {
      const x = dateToX(m.date, grid) + grid.dayPx/2;
      if(x<0||x>totalPx) return;
      const line = ce('div','');
      line.style.cssText = `position:absolute;left:${x}px;top:0;width:2px;height:9999px;border-left:2px dashed #f59e0b;pointer-events:none;z-index:2;opacity:0.7`;
      cell.appendChild(line);
    });
  }

  // ── CHANNEL ROWS ──
  let channels = d.channels || [];
  if(STATE.filters.channels.length) channels = channels.filter(c=>STATE.filters.channels.includes(c.id));

  channels.forEach(channel => {
    const labelHtml = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis">${channel.name}</span>` +
      (STATE.isAdmin ? `<button class="row-add-btn" title="Nouvelle action" onclick="openActionModal(null,null,'${channel.id}')">＋</button>` : '');
    const { row, lbl, cell } = makeDataRow('', labelHtml, 36);

    const channelActions = (d.actions||[]).filter(a => a.channelId === channel.id);

    // ── PASS 1: assign levels & compute each pill's height ──
    const PILL_H_COLLAPSED = 26;
    const PILL_SPACING = 4;
    const placed = []; // right-edge x per level
    const levelHeights = []; // tallest pill height per level
    const pillData = [];

    channelActions.forEach(action => {
      const aStart = action.startDate||action.date;
      const aEnd = action.endDate||action.date||action.startDate;
      if(!aStart) return;
      const x1 = dateToX(aStart, grid);
      const w = durationToPx(aStart, aEnd, grid);
      if(x1 > totalPx || x1+w < 0) return;
      let level = 0;
      while(placed[level] !== undefined && placed[level] > x1) level++;
      placed[level] = x1 + w;

      const isOpen = STATE.expandedActions.has(action.id);
      let pillH = PILL_H_COLLAPSED;
      if(isOpen) {
        pillH = 44; // header + date line
        if(action.imageData) pillH += 74;
        pillH += (action.kpis||[]).length * 24;
        if(!action.imageData && !(action.kpis||[]).length) pillH += 18;
      }
      if(!levelHeights[level] || levelHeights[level] < pillH) levelHeights[level] = pillH;
      pillData.push({ action, x1, w, level, pillH });
    });

    // ── PASS 2: render each pill at its correct top offset ──
    pillData.forEach(({ action, x1, w, level, pillH }) => {
      let top = 4;
      for(let l = 0; l < level; l++) top += (levelHeights[l]||PILL_H_COLLAPSED) + PILL_SPACING;
      const pill = appendActionPillAbs(cell, action, d, x1, w, top);
      pill.style.minHeight = pillH+'px';
    });

    // Row height = sum of all level heights + spacing
    let rowH = 36;
    if(levelHeights.length) {
      rowH = 8;
      for(let l = 0; l < levelHeights.length; l++) rowH += (levelHeights[l]||PILL_H_COLLAPSED) + PILL_SPACING;
      rowH += 4;
    }
    row.style.minHeight = rowH+'px';
    lbl.style.minHeight = rowH+'px';
    cell.style.minHeight = rowH+'px';
    root.appendChild(row);
  });

  // Scroll to focus period (mirrors Timeline behavior)
  if(grid.scale !== 'year') {
    requestAnimationFrame(() => {
      root.scrollLeft = Math.max(0, grid.focusStartDay * grid.dayPx - 20);
    });
  }
}

// Helper: absolutely-positioned action pill for the Canal view
function appendActionPillAbs(cell, action, d, x1, w, top) {
  const camp = (d.campaigns||[]).find(c=>c.id===action.campaignId);
  const color = camp ? (camp.color||'#54D89C') : '#94a3b8';
  const achieved = (action.kpis||[]).some(k=>k.objectif && Number(k.realise||0)>=Number(k.objectif));
  const dateStr = fmtDate(action.startDate||action.date);
  const endDateStr = action.endDate && action.endDate !== (action.startDate||action.date) ? fmtDate(action.endDate) : null;
  const isOpen = STATE.expandedActions.has(action.id);

  const pill = ce('div','cv-action-pill'+(isOpen?' cv-action-pill-open':''));
  pill.style.left = x1+'px';
  const pillW = isOpen ? Math.max(160, w) : Math.max(60, w);
  pill.style.width = pillW+'px';
  pill.style.top = top+'px';
  pill.style.borderLeftColor = color;

  let html = `
    <div style="display:flex;align-items:flex-start;gap:4px">
      <div style="flex:1;min-width:0">
        <div class="cap-campaign" style="color:${color};font-size:9px;font-weight:700;font-family:var(--font-head);text-transform:uppercase;letter-spacing:.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${camp?.title||'–'}</div>
        <div class="cap-title" style="font-size:11px;font-weight:600;font-family:var(--font-head);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:${isOpen?'normal':'nowrap'};margin-top:1px">${achieved?'<span style="color:var(--star)">★</span> ':''}${action.title||'Action'}</div>
      </div>
      <span class="cv-expand-toggle" data-aid="${action.id}" style="cursor:pointer;opacity:0.6;font-size:11px;flex-shrink:0;padding:1px 3px" title="${isOpen?'Réduire':'Déplier'}">${isOpen?'▾':'▸'}</span>
    </div>
    <div class="cap-date" style="font-size:9px;color:var(--text3);margin-top:1px;display:${isOpen?'block':'none'}">${dateStr}${endDateStr?` → ${endDateStr}`:''}</div>`;

  if(isOpen) {
    html += `<div style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px">`;
    if(action.imageData) {
      html += `<img src="${action.imageData}" style="max-width:100%;max-height:70px;object-fit:contain;border-radius:4px;display:block;margin-bottom:4px">`;
    }
    (action.kpis||[]).forEach(k => {
      if(!k.type) return;
      const pct = k.objectif ? Math.round(Number(k.realise||0)/Number(k.objectif)*100) : null;
      html += `<div style="margin-bottom:3px">
        <div style="display:flex;justify-content:space-between;font-size:10px">
          <span style="color:var(--text3)">${k.type}</span>
          <span style="font-weight:700;color:${pct>=100?'var(--success)':'var(--danger)'}">${k.realise||0}/${k.objectif||'–'}${pct!==null?` (${pct}%)`:''}</span>
        </div>
        ${pct!==null?`<div style="height:3px;background:var(--border);border-radius:2px;margin-top:1px"><div style="height:100%;width:${Math.min(pct,100)}%;background:${pct>=100?'var(--success)':'var(--danger)'};border-radius:2px"></div></div>`:''}
      </div>`;
    });
    if(!action.imageData && !(action.kpis||[]).length) {
      html += `<div style="font-size:10px;color:var(--text3)">Aucun détail supplémentaire</div>`;
    }
    html += `</div>`;
  }

  pill.innerHTML = html;

  const toggle = pill.querySelector('.cv-expand-toggle');
  toggle.onclick = (ev) => {
    ev.stopPropagation();
    if(STATE.expandedActions.has(action.id)) STATE.expandedActions.delete(action.id);
    else STATE.expandedActions.add(action.id);
    render();
  };

  if(!isOpen) {
    pill.addEventListener('mouseenter', () => { pill.querySelector('.cap-date').style.display = 'block'; if(action.imageData) showTooltipImg2(pill, action); });
    pill.addEventListener('mouseleave', () => { pill.querySelector('.cap-date').style.display = 'none'; hideTooltip(); });
  }
  pill.onclick = (ev) => {
    if(ev.target === toggle) return;
    openActionDetailModal(action);
  };
  cell.appendChild(pill);

  // Return the actual height so the caller can size the row correctly
  return pill;
}
function showTooltipImg2(el, action) {
  if(!action.imageData) return;
  const rect = el.getBoundingClientRect();
  const fakeEvent = { clientX: rect.left, clientY: rect.bottom };
  showTooltipImg(fakeEvent, action);
}

// ═══════════════════════════════════════════════════════════════
// MODALS: CAMPAIGN
// ═══════════════════════════════════════════════════════════════
function openCampaignModal(existing, defaultType) {
  const d = data();
  const isNew = !existing;
  const camp = existing ? {...existing} : {id:uid(),type:defaultType||'acquisition',color:'#54D89C',kpi:{type:'',objectif:'',realise:''}};

  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal lg');

  // Working copy of actions for this campaign (managed in UI)
  let campActions = (d.actions||[]).filter(a=>a.campaignId===camp.id).map(a=>({...a,kpis:[...(a.kpis||[])]}));

  function buildChannelSections() {
    return d.channels.map(ch => {
      const chActions = campActions.filter(a=>a.channelId===ch.id);
      const isActive = chActions.length > 0 || (camp._activeChannels||[]).includes(ch.id);
      return `
      <div class="cf-channel-block" data-chid="${ch.id}" style="border:1.5px solid ${isActive?'var(--brand-green)':'var(--border)'};border-radius:8px;margin-bottom:8px;overflow:hidden">
        <div class="cf-channel-header" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${isActive?'rgba(84,216,156,0.1)':'var(--bg2)'};cursor:pointer">
          <input type="checkbox" class="cf-ch-check" data-chid="${ch.id}" ${isActive?'checked':''} style="width:16px;height:16px;accent-color:var(--brand-green)">
          <span style="font-weight:700;font-size:12px;font-family:var(--font-head);flex:1">${ch.name}</span>
          <span style="font-size:10px;color:var(--text3)">${chActions.length} action${chActions.length!==1?'s':''}</span>
          <span class="cf-ch-toggle" style="color:var(--brand-green);font-size:12px">${isActive?'▾':'▸'}</span>
        </div>
        <div class="cf-channel-body" style="display:${isActive?'block':'none'};padding:10px 12px;border-top:1px solid var(--border)">
          <div class="cf-actions-list" data-chid="${ch.id}">
            ${chActions.map((a,ai) => buildActionBlock(a, ai, ch.id)).join('')}
          </div>
          <button class="btn" style="margin-top:6px;font-size:11px" data-add-action="${ch.id}">+ Ajouter une action</button>
        </div>
      </div>`;
    }).join('');
  }

  function buildActionBlock(a, idx, chId) {
    const kpiRows = (a.kpis||[]).map((k,ki) => `
      <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">
        <select class="a-kpi-type" data-aid="${a.id}" data-ki="${ki}" style="flex:1.5;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
          ${(d.channels.find(c=>c.id===chId)?.kpis||d.kpiCampaignTypes).map(opt=>`<option value="${opt}" ${k.type===opt?'selected':''}>${opt}</option>`).join('')}
        </select>
        <input type="number" placeholder="Objectif" value="${k.objectif||''}" class="a-kpi-obj" data-aid="${a.id}" data-ki="${ki}" style="width:75px;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
        <input type="number" placeholder="Réalisé" value="${k.realise||''}" class="a-kpi-real" data-aid="${a.id}" data-ki="${ki}" style="width:75px;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
        <button class="btn-icon del-kpi" data-aid="${a.id}" data-ki="${ki}" style="color:var(--danger);width:20px;height:20px;font-size:10px">✕</button>
      </div>`).join('');
    return `
      <div class="cf-action-block" data-aid="${a.id}" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <input type="text" class="a-title" data-aid="${a.id}" value="${a.title||''}" placeholder="Nom de l'action" style="flex:1;padding:5px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);font-size:12px">
          <button class="btn-icon del-action" data-aid="${a.id}" style="color:var(--danger)">🗑</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <div style="flex:1;min-width:120px">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">TYPE DE DATE</label>
            <select class="a-datetype" data-aid="${a.id}" style="width:100%;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
              <option value="single" ${!a.endDate||a.endDate===a.startDate?'selected':''}>Date unique</option>
              <option value="range" ${a.endDate&&a.endDate!==a.startDate?'selected':''}>Plage de dates</option>
            </select>
          </div>
          <div style="flex:1;min-width:120px">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">DATE DÉBUT</label>
            <input type="date" class="a-start" data-aid="${a.id}" value="${a.startDate||a.date||''}" style="width:100%;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
          </div>
          <div class="a-end-wrap" data-aid="${a.id}" style="flex:1;min-width:120px;display:${a.endDate&&a.endDate!==a.startDate?'block':'none'}">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">DATE FIN</label>
            <input type="date" class="a-end" data-aid="${a.id}" value="${a.endDate||''}" style="width:100%;padding:4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px">
          </div>
        </div>
        <div style="margin-bottom:6px">
          <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">VISUEL</label>
          <div style="display:flex;align-items:center;gap:8px">
            ${a.imageData?`<img src="${a.imageData}" style="height:40px;border-radius:4px;object-fit:cover">`:'' }
            <input type="file" class="a-image" data-aid="${a.id}" accept="image/*" style="font-size:11px">
          </div>
        </div>
        <div>
          <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:4px">KPI DE L'ACTION</label>
          <div class="kpi-rows" data-aid="${a.id}">${kpiRows}</div>
          <button class="btn add-kpi" data-aid="${a.id}" data-chid="${chId}" style="font-size:10px;margin-top:2px">+ KPI</button>
        </div>
      </div>`;
  }

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${isNew?'Nouvelle carte stratégique':'Modifier la campagne'}</div>
      <button class="btn-icon close-btn" style="color:#fff;border-color:rgba(255,255,255,.3)">✕</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div style="background:var(--bg2);border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:var(--text3)">
        ℹ Canaux, actions et KPI modifiables à tout moment.
      </div>
      <div class="form-grid" style="margin-bottom:10px">
        <div class="form-row">
          <label>Type</label>
          <select id="cf-strat">
            <option value="acquisition" ${camp.type==='acquisition'?'selected':''}>Acquisition</option>
            <option value="fidelisation" ${camp.type==='fidelisation'?'selected':''}>Fidélisation</option>
            <option value="reglementaire" ${camp.type==='reglementaire'?'selected':''}>Réglementaire</option>
          </select>
        </div>
        <div class="form-row">
          <label>Nom *</label>
          <input type="text" id="cf-title" value="${camp.title||''}" placeholder="Ex : Offre Printemps">
        </div>
      </div>
      <div class="form-grid" style="margin-bottom:10px">
        <div class="form-row">
          <label>Début</label>
          <input type="date" id="cf-start" value="${camp.startDate||''}">
        </div>
        <div class="form-row">
          <label>Fin</label>
          <input type="date" id="cf-end" value="${camp.endDate||''}">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <label>Couleur personnalisée</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="color" id="cf-color" value="${camp.color||'#54D89C'}" style="width:100%;height:36px;border-radius:6px;cursor:pointer;border:1px solid var(--border2)">
        </div>
        <div class="color-swatch-row" id="cf-swatches">
          ${d.campaignColors.map(c=>{
            const legendEntry = (d.colorLegend||[]).find(e=>e.hex.toLowerCase()===c.toLowerCase());
            return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px">
              <div class="color-swatch${camp.color===c?' selected':''}" style="background:${c}" data-color="${c}" title="${legendEntry?legendEntry.label:c}"></div>
              ${legendEntry?`<span style="font-size:9px;color:var(--text3);max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${legendEntry.label}</span>`:''}
            </div>`;
          }).join('')}
        </div>
        <div id="cf-new-color-wrap" style="margin-top:10px;padding:10px;border:1px dashed var(--border2);border-radius:8px">
          <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">+ Nouvelle couleur avec catégorie</div>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="color" id="cf-new-color-picker" value="#6366f1" style="width:36px;height:32px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);padding:2px">
            <input type="text" id="cf-new-color-label" placeholder="Libellé (ex : Offre commerciale)" style="flex:1;padding:6px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
            <button class="btn" id="btn-add-color-with-label" type="button">+ Ajouter</button>
          </div>
        </div>
      </div>
      <div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;font-family:var(--font-head)">KPI DE LA CAMPAGNE (GLOBAL)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:2;min-width:120px">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">TYPE</label>
            <select id="cf-kpi-type" style="width:100%;padding:6px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
              <option value="">-- Aucun --</option>
              ${d.kpiCampaignTypes.map(t=>`<option value="${t}" ${(camp.kpi?.type)===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div style="flex:1;min-width:80px">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">OBJECTIF</label>
            <input type="number" id="cf-kpi-obj" value="${camp.kpi?.objectif||''}" style="width:100%;padding:6px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
          </div>
          <div style="flex:1;min-width:80px">
            <label style="font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:2px">RÉALISÉ</label>
            <input type="number" id="cf-kpi-real" value="${camp.kpi?.realise||''}" style="width:100%;padding:6px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
          </div>
        </div>
      </div>
      <div style="font-size:12px;font-weight:700;font-family:var(--font-head);margin-bottom:8px">Canaux &amp; actions</div>
      <div id="cf-channels">${buildChannelSections()}</div>
    </div>
    <div class="modal-footer">
      ${!isNew?`<button class="btn danger" id="btn-delete-camp">🗑 Supprimer</button>`:''}
      <button class="btn" id="btn-cancel-camp">Annuler</button>
      <button class="btn active" id="btn-save-camp">✓ Valider</button>
    </div>`;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Color swatches
  function refreshSwatches() {
    const wrap = document.getElementById('cf-swatches');
    wrap.innerHTML = d.campaignColors.map(c=>{
      const legendEntry = (d.colorLegend||[]).find(e=>e.hex.toLowerCase()===c.toLowerCase());
      const isSel = document.getElementById('cf-color').value.toLowerCase() === c.toLowerCase();
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px">
        <div class="color-swatch${isSel?' selected':''}" style="background:${c}" data-color="${c}" title="${legendEntry?legendEntry.label:c}"></div>
        ${legendEntry?`<span style="font-size:9px;color:var(--text3);max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${legendEntry.label}</span>`:''}
      </div>`;
    }).join('');
    bindSwatchClicks();
  }

  function bindSwatchClicks() {
    modal.querySelectorAll('.color-swatch').forEach(sw => {
      sw.onclick = () => {
        modal.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected');
        document.getElementById('cf-color').value = sw.dataset.color;
      };
    });
  }
  bindSwatchClicks();

  document.getElementById('btn-add-color-with-label').onclick = () => {
    const hex = document.getElementById('cf-new-color-picker').value;
    const label = document.getElementById('cf-new-color-label').value.trim();
    if(!label) { toast('Merci de renseigner un libellé pour cette couleur'); return; }
    if(!d.campaignColors.some(c=>c.toLowerCase()===hex.toLowerCase())) {
      d.campaignColors.push(hex);
    }
    if(!d.colorLegend) d.colorLegend = [];
    const existingEntry = d.colorLegend.find(e=>e.hex.toLowerCase()===hex.toLowerCase());
    if(existingEntry) existingEntry.label = label;
    else d.colorLegend.push({ hex, label });
    save();
    document.getElementById('cf-color').value = hex;
    document.getElementById('cf-new-color-label').value = '';
    refreshSwatches();
    toast('Couleur et catégorie ajoutées');
  };

  function rebuildChannels() {
    document.getElementById('cf-channels').innerHTML = buildChannelSections();
    bindChannelEvents();
  }

  function bindChannelEvents() {
    // Channel header toggle
    modal.querySelectorAll('.cf-channel-header').forEach(hdr => {
      hdr.onclick = (ev) => {
        if(ev.target.type==='checkbox') return;
        const chid = hdr.closest('.cf-channel-block').dataset.chid;
        const body = hdr.nextElementSibling;
        const check = hdr.querySelector('.cf-ch-check');
        const open = body.style.display==='block';
        body.style.display = open?'none':'block';
        hdr.querySelector('.cf-ch-toggle').textContent = open?'▸':'▾';
        hdr.style.background = open?'var(--bg2)':'rgba(84,216,156,0.1)';
        hdr.closest('.cf-channel-block').style.borderColor = open?'var(--border)':'var(--brand-green)';
        check.checked = !open;
      };
    });

    // Checkboxes
    modal.querySelectorAll('.cf-ch-check').forEach(cb => {
      cb.onchange = () => {
        const chid = cb.dataset.chid;
        const block = cb.closest('.cf-channel-block');
        const body = block.querySelector('.cf-channel-body');
        body.style.display = cb.checked?'block':'none';
        block.style.borderColor = cb.checked?'var(--brand-green)':'var(--border)';
        block.querySelector('.cf-ch-toggle').textContent = cb.checked?'▾':'▸';
        block.querySelector('.cf-channel-header').style.background = cb.checked?'rgba(84,216,156,0.1)':'var(--bg2)';
      };
    });

    // Date type toggle per action
    modal.querySelectorAll('.a-datetype').forEach(sel => {
      sel.onchange = () => {
        const aid = sel.dataset.aid;
        const wrap = modal.querySelector(`.a-end-wrap[data-aid="${aid}"]`);
        if(wrap) wrap.style.display = sel.value==='range'?'block':'none';
      };
    });

    // Image upload
    modal.querySelectorAll('.a-image').forEach(inp => {
      inp.onchange = function() {
        const aid = this.dataset.aid;
        const file = this.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const a = campActions.find(x=>x.id===aid);
          if(a) a.imageData = e.target.result;
        };
        reader.readAsDataURL(file);
      };
    });

    // Add action button
    modal.querySelectorAll('[data-add-action]').forEach(btn => {
      btn.onclick = () => {
        const chid = btn.dataset.addAction;
        const newA = {id:uid(), channelId:chid, campaignId:camp.id, title:'', kpis:[], startDate:'', endDate:''};
        campActions.push(newA);
        rebuildChannels();
        // Scroll to new action
        setTimeout(() => btn.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
      };
    });

    // Delete action
    modal.querySelectorAll('.del-action').forEach(btn => {
      btn.onclick = () => {
        campActions = campActions.filter(a=>a.id!==btn.dataset.aid);
        rebuildChannels();
      };
    });

    // Add KPI
    modal.querySelectorAll('.add-kpi').forEach(btn => {
      btn.onclick = () => {
        const a = campActions.find(x=>x.id===btn.dataset.aid);
        const ch = d.channels.find(c=>c.id===btn.dataset.chid);
        if(a) { a.kpis.push({type:ch?.kpis?.[0]||d.kpiCampaignTypes[0]||'',objectif:'',realise:''}); rebuildChannels(); }
      };
    });

    // Delete KPI
    modal.querySelectorAll('.del-kpi').forEach(btn => {
      btn.onclick = () => {
        const a = campActions.find(x=>x.id===btn.dataset.aid);
        if(a) { a.kpis.splice(parseInt(btn.dataset.ki),1); rebuildChannels(); }
      };
    });

    // Live-update action fields
    modal.querySelectorAll('.a-title').forEach(inp => { inp.oninput = e => { const a=campActions.find(x=>x.id===inp.dataset.aid); if(a) a.title=e.target.value; }; });
    modal.querySelectorAll('.a-start').forEach(inp => { inp.onchange = e => { const a=campActions.find(x=>x.id===inp.dataset.aid); if(a){a.startDate=e.target.value;a.date=e.target.value;} }; });
    modal.querySelectorAll('.a-end').forEach(inp => { inp.onchange = e => { const a=campActions.find(x=>x.id===inp.dataset.aid); if(a) a.endDate=e.target.value; }; });
    modal.querySelectorAll('.a-kpi-type').forEach(sel => { sel.onchange = e => { const a=campActions.find(x=>x.id===sel.dataset.aid); if(a&&a.kpis[sel.dataset.ki]) a.kpis[sel.dataset.ki].type=e.target.value; }; });
    modal.querySelectorAll('.a-kpi-obj').forEach(inp => { inp.oninput = e => { const a=campActions.find(x=>x.id===inp.dataset.aid); if(a&&a.kpis[inp.dataset.ki]) a.kpis[inp.dataset.ki].objectif=e.target.value; }; });
    modal.querySelectorAll('.a-kpi-real').forEach(inp => { inp.oninput = e => { const a=campActions.find(x=>x.id===inp.dataset.aid); if(a&&a.kpis[inp.dataset.ki]) a.kpis[inp.dataset.ki].realise=e.target.value; }; });
  }
  bindChannelEvents();

  function close() { document.body.removeChild(overlay); }
  modal.querySelector('.close-btn').onclick = close;
  document.getElementById('btn-cancel-camp').onclick = close;
  overlay.onclick = ev => { if(ev.target===overlay) close(); };

  document.getElementById('btn-save-camp').onclick = () => {
    const title = document.getElementById('cf-title').value.trim();
    if(!title) { alert('Le titre est obligatoire'); return; }
    camp.title = title;
    camp.type = document.getElementById('cf-strat').value;
    camp.startDate = document.getElementById('cf-start').value;
    camp.endDate = document.getElementById('cf-end').value;
    camp.color = document.getElementById('cf-color').value;
    camp.kpi = {
      type: document.getElementById('cf-kpi-type').value,
      objectif: document.getElementById('cf-kpi-obj').value,
      realise: document.getElementById('cf-kpi-real').value
    };

    if(isNew) d.campaigns.push(camp);
    else {
      const idx = d.campaigns.findIndex(c=>c.id===camp.id);
      if(idx>=0) d.campaigns[idx] = camp;
    }

    // Sync actions: remove old ones for this campaign, add new ones
    d.actions = (d.actions||[]).filter(a=>a.campaignId!==camp.id);
    campActions.forEach(a => { a.campaignId = camp.id; d.actions.push(a); });

    save(); close(); render();
    toast(isNew?'Campagne créée':'Campagne mise à jour');
  };

  if(!isNew) {
    document.getElementById('btn-delete-camp').onclick = () => {
      if(!confirm(`Supprimer la campagne "${camp.title}" ?`)) return;
      d.campaigns = d.campaigns.filter(c=>c.id!==camp.id);
      d.actions = (d.actions||[]).filter(a=>a.campaignId!==camp.id);
      save(); close(); render();
      toast('Campagne supprimée');
    };
  }
}

// ═══════════════════════════════════════════════════════════════
// CAMPAIGN POPUP — for narrow cards
// ═══════════════════════════════════════════════════════════════
function openCampaignPopup(camp) {
  const d = data();
  const atteinte = campaignAtteinte(camp);
  const prog = getProgress(camp);
  const actions = (d.actions||[]).filter(a=>a.campaignId===camp.id);
  const color = camp.color||'#54D89C';

  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal');

  let actionsHtml = '';
  if(actions.length) {
    const byChannel = {};
    actions.forEach(a => {
      const ch = (d.channels.find(c=>c.id===a.channelId)||{}).name||'–';
      if(!byChannel[ch]) byChannel[ch]=[];
      byChannel[ch].push(a);
    });
    actionsHtml = Object.entries(byChannel).map(([ch, acts]) => `
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.4px;margin-bottom:4px;border-left:3px solid ${color};padding-left:6px">${ch}</div>
        ${acts.map(a => {
          const kpiHtml = (a.kpis||[]).map(k => {
            const pct = k.objectif?Math.round(Number(k.realise||0)/Number(k.objectif)*100):null;
            return `<span style="font-size:10px;font-weight:700;color:${pct>=100?'var(--success)':'var(--danger)'}">${k.type}: ${k.realise||0}/${k.objectif||'–'}${pct!==null?` (${pct}%)`:''}</span>`;
          }).join(' · ');
          return `<div style="padding:6px 8px;background:var(--bg);border-radius:6px;border:1px solid var(--border);margin-bottom:4px">
            ${a.imageData?`<img src="${a.imageData}" style="max-width:100%;max-height:60px;object-fit:contain;border-radius:4px;margin-bottom:4px;display:block">` : ''}
            <div style="font-weight:600;font-size:12px">${a.title||'Action'}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">${fmtDate(a.startDate||a.date)}${a.endDate&&a.endDate!==(a.startDate||a.date)?` → ${fmtDate(a.endDate)}`:''}</div>
            ${kpiHtml?`<div style="margin-top:4px">${kpiHtml}</div>`:''}
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  modal.innerHTML = `
    <div class="modal-header" style="background:${color};border-color:${color}">
      <div class="modal-title" style="color:${isContrastDark(color)?'#002828':'#fff'}">${atteinte?'★ ':''}${camp.title||'Campagne'}</div>
      <button class="btn-icon close-btn" style="border-color:rgba(255,255,255,.4);color:#fff">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Dates</div>
          <div style="font-weight:600">${fmtDate(camp.startDate)} → ${fmtDate(camp.endDate||camp.startDate)}</div></div>
        <div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Type</div>
          <div style="font-weight:600">${camp.campaignType||camp.type||'–'}</div></div>
      </div>
      ${prog!==null?`<div style="background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:11px;font-weight:600">${camp.kpi?.type||'KPI'}</span>
          <span style="font-size:11px;font-weight:700;color:${prog>=100?'var(--success)':'var(--danger)'}">${prog}%${prog>100?` (+${prog-100}%)`:''}${atteinte?' ★':''}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill ${prog>=100?'green':'red'}" style="width:${Math.min(prog,100)}%"></div></div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${camp.kpi?.realise||0} / ${camp.kpi?.objectif||0}</div>
      </div>`:''}
      ${actionsHtml || '<div style="color:var(--text3);font-size:12px">Aucune action</div>'}
    </div>
    <div class="modal-footer">
      ${STATE.isAdmin?`<button class="btn" id="popup-edit-btn">✏ Modifier</button>`:''}
      <button class="btn active" id="popup-close-btn">Fermer</button>
    </div>`;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  const close = () => document.body.removeChild(overlay);
  modal.querySelector('.close-btn').onclick = close;
  document.getElementById('popup-close-btn').onclick = close;
  overlay.onclick = ev => { if(ev.target===overlay) close(); };
  if(STATE.isAdmin) {
    document.getElementById('popup-edit-btn').onclick = () => { close(); openCampaignModal(camp); };
  }
}
function openActionModalWithReturn(existing, campaignId, onClose) {
  openActionModal(existing, campaignId, null, onClose);
}

function openActionModal(existing, campaignId, channelId, onCloseCallback) {
  const d = data();
  const isNew = !existing;
  const action = existing ? {...existing, kpis:[...(existing.kpis||[])]} : {
    id:uid(), campaignId:campaignId||'', channelId:channelId||'', kpis:[]
  };
  
  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${isNew?'Nouvelle action':'Modifier l\'action'}</div>
      <button class="btn-icon close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Titre *</label>
        <input type="text" id="af-title" value="${action.title||''}" placeholder="Nom de l'action">
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Canal *</label>
          <select id="af-channel">
            <option value="">-- Choisir --</option>
            ${d.channels.map(c=>`<option value="${c.id}" ${action.channelId===c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <label>Campagne</label>
          <select id="af-campaign">
            <option value="">-- Aucune --</option>
            ${(d.campaigns||[]).map(c=>`<option value="${c.id}" ${action.campaignId===c.id?'selected':''}>${c.title}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Type de date</label>
        <select id="af-datetype">
          <option value="single" ${!action.endDate?'selected':''}>Date unique</option>
          <option value="range" ${action.endDate?'selected':''}>Période</option>
        </select>
      </div>
      <div class="form-grid" id="af-dates">
        <div class="form-row">
          <label>Date début</label>
          <input type="date" id="af-start" value="${action.startDate||action.date||''}">
        </div>
        <div class="form-row" id="af-end-wrap">
          <label>Date fin</label>
          <input type="date" id="af-end" value="${action.endDate||''}">
        </div>
      </div>
      <div class="form-row">
        <label>Image (optionnel)</label>
        <input type="file" id="af-image" accept="image/*">
        ${action.imageData?`<img src="${action.imageData}" style="max-width:100%;max-height:80px;margin-top:6px;border-radius:4px;object-fit:contain">`:''}
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">KPI</label>
        <div id="kpi-list"></div>
        <button class="btn" id="btn-add-kpi" style="margin-top:6px">+ KPI</button>
      </div>
    </div>
    <div class="modal-footer">
      ${!isNew?`<button class="btn danger" id="btn-delete-action">🗑</button>`:''}
      <button class="btn" id="btn-cancel-act">Annuler</button>
      <button class="btn active" id="btn-save-act">Enregistrer</button>
    </div>`;
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  // Date type toggle
  const afDatetype = document.getElementById('af-datetype');
  const afEndWrap = document.getElementById('af-end-wrap');
  afEndWrap.style.display = afDatetype.value==='range'?'':'none';
  afDatetype.onchange = () => { afEndWrap.style.display = afDatetype.value==='range'?'':'none'; };
  
  // Image
  document.getElementById('af-image').onchange = function() {
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => { action.imageData = e.target.result; };
    reader.readAsDataURL(file);
  };
  
  // KPI list
  function refreshKpiList() {
    const kl = document.getElementById('kpi-list');
    kl.innerHTML = '';
    action.kpis.forEach((k,i) => {
      // Get channel KPIs
      const chId = document.getElementById('af-channel').value;
      const ch = d.channels.find(c=>c.id===chId);
      const kpiOptions = ch?.kpis||d.kpiCampaignTypes;
      
      const row = ce('div','');
      row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center';
      row.innerHTML = `
        <select style="flex:1.5;padding:5px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
          ${kpiOptions.map(opt=>`<option value="${opt}" ${k.type===opt?'selected':''}>${opt}</option>`).join('')}
        </select>
        <input type="number" placeholder="Objectif" value="${k.objectif||''}" style="width:80px;padding:5px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
        <input type="number" placeholder="Réalisé" value="${k.realise||''}" style="width:80px;padding:5px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
        <button class="btn-icon" style="color:var(--danger)">✕</button>`;
      row.querySelectorAll('select')[0].onchange = e => { action.kpis[i].type = e.target.value; };
      row.querySelectorAll('input')[0].oninput = e => { action.kpis[i].objectif = e.target.value; };
      row.querySelectorAll('input')[1].oninput = e => { action.kpis[i].realise = e.target.value; };
      row.querySelector('.btn-icon').onclick = () => { action.kpis.splice(i,1); refreshKpiList(); };
      kl.appendChild(row);
    });
  }
  refreshKpiList();
  
  document.getElementById('btn-add-kpi').onclick = () => {
    const chId = document.getElementById('af-channel').value;
    const ch = d.channels.find(c=>c.id===chId);
    const firstKpi = ch?.kpis?.[0]||d.kpiCampaignTypes[0]||'';
    action.kpis.push({type:firstKpi,objectif:'',realise:''});
    refreshKpiList();
  };
  
  document.getElementById('af-channel').onchange = refreshKpiList;
  
  function close() { document.body.removeChild(overlay); if(onCloseCallback) onCloseCallback(); }
  function closeNoReturn() { document.body.removeChild(overlay); }
  modal.querySelector('.close-btn').onclick = closeNoReturn;
  document.getElementById('btn-cancel-act').onclick = closeNoReturn;
  overlay.onclick = ev => { if(ev.target===overlay) closeNoReturn(); };
  
  document.getElementById('btn-save-act').onclick = () => {
    const title = document.getElementById('af-title').value.trim();
    if(!title) { alert('Le titre est obligatoire'); return; }
    action.title = title;
    action.channelId = document.getElementById('af-channel').value;
    action.campaignId = document.getElementById('af-campaign').value;
    const dt = document.getElementById('af-datetype').value;
    if(dt==='single') {
      action.date = document.getElementById('af-start').value;
      action.startDate = action.date;
      action.endDate = action.date;
    } else {
      action.startDate = document.getElementById('af-start').value;
      action.endDate = document.getElementById('af-end').value;
      action.date = action.startDate;
    }
    
    if(!d.actions) d.actions = [];
    if(isNew) d.actions.push(action);
    else {
      const idx = d.actions.findIndex(a=>a.id===action.id);
      if(idx>=0) d.actions[idx] = action;
    }
    save(); render();
    toast(isNew?'Action créée':'Action mise à jour');
    close(); // triggers onCloseCallback if set
  };
  
  if(!isNew) {
    document.getElementById('btn-delete-action').onclick = () => {
      if(!confirm('Supprimer cette action ?')) return;
      d.actions = d.actions.filter(a=>a.id!==action.id);
      save(); render();
      toast('Action supprimée');
      close();
    };
  }
}

function openActionDetailModal(action) {
  const d = data();
  const channel = d.channels.find(c=>c.id===action.channelId);
  const camp = (d.campaigns||[]).find(c=>c.id===action.campaignId);
  
  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal');
  
  let kpiHtml = '';
  (action.kpis||[]).forEach(k => {
    const pct = k.objectif ? Math.round(Number(k.realise||0)/Number(k.objectif)*100) : null;
    kpiHtml += `<div class="kpi-card">
      <div class="kpi-title">${k.type}</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <div class="kpi-value">${k.realise||0}</div>
        <div class="kpi-sub">/ ${k.objectif||0}</div>
        ${pct!==null?`<div class="kpi-sub" style="color:${pct>=100?'var(--success)':'var(--danger)'};font-weight:700">${pct}%${pct>100?` (+${pct-100}%)`:''}  ${pct>=100?'★':''}</div>`:''}
      </div>
      ${pct!==null?`<div class="progress-bar" style="margin-top:4px"><div class="progress-fill ${pct>=100?'green':'red'}" style="width:${Math.min(pct,100)}%"></div></div>`:''}
    </div>`;
  });
  
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${action.title||'Action'}</div>
      <button class="btn-icon close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px">CANAL</div>
          <div style="font-weight:600">${channel?.name||'–'}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px">CAMPAGNE</div>
          <div style="font-weight:600">${camp?.title||'–'}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px">DATES</div>
          <div style="font-weight:600">${fmtDate(action.startDate||action.date)}${action.endDate&&action.endDate!==(action.startDate||action.date)?` → ${fmtDate(action.endDate)}`:''}</div>
        </div>
      </div>
      ${action.imageData?`<img src="${action.imageData}" style="max-width:100%;max-height:200px;object-fit:contain;border-radius:6px;margin-bottom:14px;border:1px solid var(--border)">`:'' }
      ${kpiHtml||'<div style="color:var(--text3);font-size:12px">Aucun KPI défini</div>'}
    </div>
    <div class="modal-footer">
      ${STATE.isAdmin?`<button class="btn" id="btn-edit-action">✏ Modifier</button>`:''}
      <button class="btn" id="btn-close-detail">Fermer</button>
    </div>`;
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  function close() { document.body.removeChild(overlay); }
  modal.querySelector('.close-btn').onclick = close;
  document.getElementById('btn-close-detail').onclick = close;
  overlay.onclick = ev => { if(ev.target===overlay) close(); };
  
  if(STATE.isAdmin) {
    document.getElementById('btn-edit-action').onclick = () => { close(); openActionModal(action); };
  }
}

  if(readOnly) {

    <div class="modal-body"><p style="color:var(--text2)">${fmtDate(ml.date)}</p></div>
    <div class="modal-footer"><button class="btn" id="btn-ok">Fermer</button></div>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    const close = () => document.body.removeChild(overlay);
    modal.querySelector('.close-btn').onclick = close;
    document.getElementById('btn-ok').onclick = close;
    overlay.onclick = ev => { if(ev.target===overlay) close(); };

      <button class="btn active" id="btn-save-ml">Enregistrer</button>
    </div>`;
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  function close() { document.body.removeChild(overlay); }
  modal.querySelector('.close-btn').onclick = close;
  document.getElementById('btn-cancel-ml').onclick = close;
  overlay.onclick = ev => { if(ev.target===overlay) close(); };
  
  document.getElementById('btn-save-ml').onclick = () => {
    ml.title = document.getElementById('ml-title').value.trim();
    ml.date = document.getElementById('ml-date').value;
    ml.icon = document.getElementById('ml-icon').value;
    if(!ml.title||!ml.date) { alert('Titre et date obligatoires'); return; }
    if(!d.milestones) d.milestones = [];
    if(isNew) d.milestones.push(ml);
    else { const i=d.milestones.findIndex(m=>m.id===ml.id); if(i>=0) d.milestones[i]=ml; }
    save(); close(); render(); toast(isNew?'Jalon créé':'Jalon mis à jour');
  };
  
  if(!isNew) {
    document.getElementById('btn-del-ml').onclick = () => {
      if(!confirm('Supprimer ce jalon ?')) return;
      d.milestones = d.milestones.filter(m=>m.id!==ml.id);
      save(); close(); render(); toast('Jalon supprimé');
    };
  }
}

// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-admin').addEventListener('click', () => {
  if(STATE.isAdmin) {
    toggleAdminPanel();
  } else {
    showAdminLoginModal();
  }
});

function showAdminLoginModal() {
  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">🔒 Connexion administrateur</div>
      <button class="btn-icon close-btn" style="color:#fff;border-color:rgba(255,255,255,.3)">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row" style="margin-bottom:6px">
        <label>Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="admin-login-pwd" placeholder="Mot de passe administrateur" style="padding-right:38px" autocomplete="off">
          <button type="button" id="btn-toggle-pwd-visibility" title="Afficher / masquer le mot de passe"
            style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:4px;color:var(--text3)">👁</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btn-cancel-admin-login">Annuler</button>
      <button class="btn active" id="btn-confirm-admin-login">Se connecter</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.appendChild(modal);

  const pwdInput = document.getElementById('admin-login-pwd');
  const eyeBtn = document.getElementById('btn-toggle-pwd-visibility');
  let visible = false;
  eyeBtn.onclick = () => {
    visible = !visible;
    pwdInput.type = visible ? 'text' : 'password';
    eyeBtn.textContent = visible ? '🙈' : '👁';
  };

  function close() { document.body.removeChild(overlay); }
  modal.querySelector('.close-btn').onclick = close;
  document.getElementById('btn-cancel-admin-login').onclick = close;
  overlay.onclick = ev => { if(ev.target === overlay) close(); };

  function attemptLogin() {
    const pwd = pwdInput.value;
    if(pwd === data().adminPassword) {
      STATE.isAdmin = true;
      document.getElementById('btn-admin').textContent = '🛠 Admin';
      document.getElementById('btn-admin').classList.add('active');
      document.getElementById('btn-quit-admin').style.display = '';
      close();
      toggleAdminPanel();
      render();
      toast('Mode admin activé');
    } else {
      alert('Mot de passe incorrect');
      pwdInput.value = '';
      pwdInput.focus();
    }
  }

  document.getElementById('btn-confirm-admin-login').onclick = attemptLogin;
  pwdInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') attemptLogin(); });
  setTimeout(() => pwdInput.focus(), 50);
}

document.getElementById('btn-quit-admin').addEventListener('click', () => {
  STATE.isAdmin = false;
  document.getElementById('btn-admin').textContent = 'Admin';
  document.getElementById('btn-admin').classList.remove('active');
  document.getElementById('btn-quit-admin').style.display = 'none';
  document.getElementById('admin-panel').classList.remove('open');
  render();
  toast('Mode admin désactivé');
});

document.getElementById('btn-close-admin').addEventListener('click', () => {
  document.getElementById('admin-panel').classList.remove('open');
});

function toggleAdminPanel() {
  const panel = document.getElementById('admin-panel');
  if(panel.classList.contains('open')) {
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    renderAdminPanel();
  }
}

function renderAdminPanel() {
  const d = data();
  const body = document.getElementById('admin-body');
  body.innerHTML = '';
  
  // Password section
  const s1 = ce('div','admin-section');
  s1.innerHTML = `<h3>Sécurité</h3>
    <div style="display:flex;gap:6px">
      <input type="password" id="adm-pwd" placeholder="Nouveau mot de passe" value="${d.adminPassword||''}" style="flex:1;padding:6px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px">
      <button class="btn" id="btn-save-pwd">Sauvegarder</button>
    </div>`;
  body.appendChild(s1);
  s1.querySelector('#btn-save-pwd').onclick = () => {
    const v = document.getElementById('adm-pwd').value.trim();
    if(!v) return;
    d.adminPassword = v;
    save(); toast('Mot de passe mis à jour');
  };
  
  // Channels
  const s2 = ce('div','admin-section');
  s2.innerHTML = `<h3>Canaux</h3><div id="adm-channels"></div>
    <button class="btn" id="btn-add-channel" style="margin-top:4px">+ Canal</button>`;
  body.appendChild(s2);
  
  function refreshChannels() {
    const el = document.getElementById('adm-channels');
    el.innerHTML = '';
    d.channels.forEach((ch,i) => {
      const row = ce('div','admin-list-item');
      row.innerHTML = `
        <button class="btn-icon" data-mv="-1" data-i="${i}" title="Monter">↑</button>
        <button class="btn-icon" data-mv="1" data-i="${i}" title="Descendre">↓</button>
        <input type="text" value="${ch.name}">
        <button class="btn-icon" data-del="${ch.id}" style="color:var(--danger)">✕</button>`;
      row.querySelector('input').onchange = e => { ch.name = e.target.value; save(); };
      row.querySelectorAll('[data-mv]').forEach(btn => {
        btn.onclick = () => {
          const from = parseInt(btn.dataset.i);
          const to = from + parseInt(btn.dataset.mv);
          if(to<0||to>=d.channels.length) return;
          [d.channels[from],d.channels[to]]=[d.channels[to],d.channels[from]];
          save(); refreshChannels(); render();
        };
      });
      row.querySelector('[data-del]').onclick = () => {
        if(!confirm(`Supprimer le canal "${ch.name}" ?`)) return;
        d.channels = d.channels.filter(c=>c.id!==ch.id);
        save(); refreshChannels(); render();
      };
      el.appendChild(row);
    });
  }
  refreshChannels();
  
  document.getElementById('btn-add-channel').onclick = () => {
    const name = prompt('Nom du nouveau canal :');
    if(!name) return;
    d.channels.push({id:uid(),name:name.trim(),kpis:['Vues','Clics','Conversions']});
    save(); refreshChannels(); render();
  };
  
  // KPI campaign types
  const s3 = ce('div','admin-section');
  s3.innerHTML = `<h3>Types de KPI campagne</h3><div id="adm-kpis"></div>
    <button class="btn" id="btn-add-kpi-type" style="margin-top:4px">+ KPI</button>`;
  body.appendChild(s3);
  
  function refreshKpiTypes() {
    const el = document.getElementById('adm-kpis');
    el.innerHTML = '';
    d.kpiCampaignTypes.forEach((k,i) => {
      const row = ce('div','admin-list-item');

// Read several JSON files, merge all their "years" data together, then
// apply the combined result through the usual replace/merge confirmation.
function importMultipleJsonFiles(files) {
  const readers = files.map(file => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = ev => {
      try { resolve(JSON.parse(ev.target.result)); }
      catch(e) { resolve(null); }
    };
    reader.onerror = () => resolve(null);
    reader.readAsText(file);
  }));

  Promise.all(readers).then(results => {
    const valid = results.filter(r => r && r.years);
    const invalidCount = results.length - valid.length;
    if(invalidCount > 0) toast(`${invalidCount} fichier(s) ignoré(s) (format invalide)`);
    mergeAndApplyMultipleImports(valid);
  });
}

// EXPORT
// ═══════════════════════════════════════════════════════════════
function exportJSON(onlyYear) {
  let yearsToExport, fileLabel;
  if(onlyYear) {
    if(!STATE.years[onlyYear]) { toast(`Aucune donnée pour l'année ${onlyYear}`); return; }
    yearsToExport = { [onlyYear]: STATE.years[onlyYear] };
    fileLabel = `planning_${onlyYear}_export.json`;
  } else {
    yearsToExport = STATE.years;
    fileLabel = `planning_toutes_annees_export.json`;
  }
  const exported = {
    exportDate: new Date().toISOString(),
    currentYear: onlyYear || STATE.currentYear,
    years: yearsToExport
  };
  const blob = new Blob([JSON.stringify(exported,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileLabel;
  a.click(); URL.revokeObjectURL(url);
  toast(onlyYear ? `Export de l'année ${onlyYear} téléchargé` : 'Export JSON téléchargé');
}

// Reusable: apply imported JSON data with merge/replace choice, then render
function applyImportedData(imported) {
  if(!imported || !imported.years) { alert('Fichier JSON invalide.'); return false; }

  const overlay = ce('div','modal-overlay');
  const modal = ce('div','modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Charger les données</div>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;margin-bottom:14px">Comment voulez-vous appliquer le fichier chargé ?</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn active" id="btn-mode-replace" style="justify-content:flex-start;padding:10px 12px;font-size:13px">
          ✓ Remplacer entièrement <span style="font-weight:400;opacity:0.8;margin-left:6px">(recommandé)</span>
        </button>
        <button class="btn" id="btn-mode-merge" style="justify-content:flex-start;padding:10px 12px;font-size:13px">
          ⇄ Fusionner avec mes données actuelles
        </button>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-top:12px">
        "Remplacer entièrement" aligne vos données sur le fichier partagé (recommandé pour rester à jour).
        "Fusionner" garde vos années locales absentes du fichier et écrase seulement celles qui s'y trouvent.
      </p>
    </div>`;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  function finish(mode) {
    // Determine which year to switch to: prefer imported.currentYear,
    // but fall back to the highest year actually present in the file
    // (covers files exported without that field, or edited by hand).
    const importedYearKeys = Object.keys(imported.years || {}).map(Number).filter(n => !isNaN(n));
    const targetYear = imported.currentYear || (importedYearKeys.length ? Math.max(...importedYearKeys) : null);

    if(mode === 'replace') {
      STATE.years = imported.years || {};
      STATE.currentYear = targetYear || STATE.currentYear;
    } else {
      Object.assign(STATE.years, imported.years || {});
      // Even in merge mode, switch to the imported file's year so the
      // newly-loaded data is immediately visible (otherwise it silently
      // loads in the background while the UI stays on the old year).
      if(targetYear) STATE.currentYear = targetYear;
    }
    save(); initYearSelect(); render();
    toast(`Données chargées — année affichée : ${STATE.currentYear}`);
    document.body.removeChild(overlay);
  }
  document.getElementById('btn-mode-replace').onclick = () => finish('replace');
  document.getElementById('btn-mode-merge').onclick = () => finish('merge');

  return true;
}

let loadSourceHandle = null; // remembered FileSystemFileHandle for reading shared data

// Read the remembered file directly, no picker. Returns parsed JSON or null.
async function readFromRememberedLoadSource() {
  if(!loadSourceHandle) loadSourceHandle = await idbGetHandle('loadsource');
  if(!loadSourceHandle) return null;
  try {
    const perm = await loadSourceHandle.queryPermission({ mode: 'read' });
    if(perm !== 'granted') {
      const req = await loadSourceHandle.requestPermission({ mode: 'read' });
      if(req !== 'granted') return null;
    }
    const file = await loadSourceHandle.getFile();
    const text = await file.text();
    return JSON.parse(text);
  } catch(e) {
    console.warn('readFromRememberedLoadSource failed', e);
    return null;
  }
}

// Hover tooltip on "Charger les données" / "Choisir un autre fichier":
// shows the same explanation as the first-time guide, available at any
// time (not just the first visit), regardless of admin status.
function initLoadButtonsTooltip() {
  const tooltipEl = document.getElementById('onboarding-tooltip');
  const buttons = [document.getElementById('btn-load-shared'), document.getElementById('btn-change-source')];

  function position(ev, btn) {
    const rect = btn.getBoundingClientRect();
    const tw = tooltipEl.offsetWidth || 360;
    let left = rect.left;
    if(left + tw > window.innerWidth - 12) left = window.innerWidth - tw - 12;
    tooltipEl.style.left = Math.max(12, left) + 'px';
    tooltipEl.style.top = (rect.bottom + 8) + 'px';
  }

  buttons.forEach(btn => {
    if(!btn) return;
    btn.addEventListener('mouseenter', (ev) => {
      tooltipEl.innerHTML = `<div class="ot-title">📂 Charger les données du fichier partagé</div>${getOnboardingGuideBodyHtml()}`;
      tooltipEl.style.display = 'block';
      position(ev, btn);
    });
    btn.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });
  });
}

// Open the native file picker (or classic <input> fallback), let the user
// pick a JSON file, remember it for next time, and return the parsed data.
async function pickAndReadJsonFile() {
  let imported = null;

  if('showOpenFilePicker' in window) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }]
      });
      const file = await handle.getFile();
      const text = await file.text();
      imported = JSON.parse(text);
      // Remember this file for next time — one-click reload afterwards
      loadSourceHandle = handle;
      await idbSetHandle(handle, 'loadsource');
    } catch(e) {
      if(e.name !== 'AbortError') { alert('Impossible de lire le fichier sélectionné.'); }
      return null;
    }
  } else {
    // Fallback for browsers without File System Access API (Firefox/Safari)
    imported = await new Promise((resolve) => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if(!file) { resolve(null); return; }
        const reader = new FileReader();
        reader.onload = ev => { try { resolve(JSON.parse(ev.target.result)); } catch(e) { resolve(null); } };
        reader.readAsText(file);
      };
      input.click();
    });
    if(!imported) { alert('Fichier JSON invalide ou aucun fichier sélectionné.'); return null; }
  }

  return imported;
}

// Let the user pick SEVERAL JSON files at once (e.g. one per year) and
// merge them all together before applying. Remembers the first file for
// the one-click reload shortcut, same as the single-file picker.
async function pickAndReadMultipleJsonFiles() {
  if('showOpenFilePicker' in window) {
    try {
      const handles = await window.showOpenFilePicker({
        multiple: true,
        types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }]
      });
      const parsedResults = await Promise.all(handles.map(async h => {
        try {
          const file = await h.getFile();
          const text = await file.text();
          return JSON.parse(text);
        } catch(e) { return null; }
      }));
      // Remember the first selected file as the "default" for next time
      if(handles.length) {
        loadSourceHandle = handles[0];
        await idbSetHandle(handles[0], 'loadsource');
      }
      return parsedResults.filter(r => r && r.years);
    } catch(e) {
      if(e.name !== 'AbortError') { alert('Impossible de lire les fichiers sélectionnés.'); }
      return [];
    }
  } else {
    // Fallback for browsers without File System Access API
    return await new Promise((resolve) => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json'; input.multiple = true;
      input.onchange = e => {
        const files = Array.from(e.target.files || []);
        if(!files.length) { resolve([]); return; }
        Promise.all(files.map(file => new Promise(res => {
          const reader = new FileReader();
          reader.onload = ev => { try { res(JSON.parse(ev.target.result)); } catch(e) { res(null); } };
          reader.onerror = () => res(null);
          reader.readAsText(file);
        }))).then(results => resolve(results.filter(r => r && r.years)));
      };
      input.click();
    });
  }
}

// Merge several parsed JSON results (each with a "years" object) into one,
// then apply through the usual replace/merge confirmation dialog.
function mergeAndApplyMultipleImports(parsedResults) {
  if(!parsedResults.length) { alert('Aucun fichier JSON valide sélectionné.'); return; }
  const combinedYears = {};
  let latestYear = null;
  parsedResults.forEach(r => {
    Object.assign(combinedYears, r.years);
    const keys = Object.keys(r.years).map(Number).filter(n => !isNaN(n));
    const y = r.currentYear || (keys.length ? Math.max(...keys) : null);
    if(y && (!latestYear || y > latestYear)) latestYear = y;
  });
  applyImportedData({ years: combinedYears, currentYear: latestYear });
}

document.getElementById('btn-load-shared').addEventListener('click', async () => {
  // If a file location was already chosen before, reuse it silently —
  // no need to browse folders again.
  if('showOpenFilePicker' in window && loadSourceHandle === null) {
    loadSourceHandle = await idbGetHandle('loadsource');
  }
  if('showOpenFilePicker' in window && loadSourceHandle) {
    const imported = await readFromRememberedLoadSource();
    if(imported) { applyImportedData(imported); return; }
    // Permission lost or file moved — fall through to re-pick below
  }

  const imported = await pickAndReadJsonFile();
  if(imported) applyImportedData(imported);
});

document.getElementById('btn-change-source').addEventListener('click', async () => {
  // Always force the file picker, ignoring any remembered file.
  // Supports selecting several files at once (e.g. one per year).
  const results = await pickAndReadMultipleJsonFiles();
  if(results.length === 1) applyImportedData(results[0]);
  else if(results.length > 1) mergeAndApplyMultipleImports(results);
});

function renderFilterTags() {

      STATE.filters.types = STATE.filters.types.filter(x=>x!==t);

    el.appendChild(tag);
  });

  (STATE.filters.colors||[]).forEach(hex => {
    const entry = (data().colorLegend||[]).find(e=>e.hex.toLowerCase()===hex.toLowerCase());
    const tag = ce('div','filter-tag');
    tag.style.background = hex;
    tag.style.color = isContrastDark(hex) ? '#000' : '#fff';

    tag.querySelector('.remove').onclick = () => {
      STATE.filters.colors = STATE.filters.colors.filter(x=>x.toLowerCase()!==hex.toLowerCase());
      renderFilterTags(); render();
    };
    el.appendChild(tag);
  });
  
  if(STATE.filters.kpiStatus!=='all') {
    const tag = ce('div','filter-tag');
    tag.style.background = STATE.filters.kpiStatus==='achieved'?'var(--success)':'var(--danger)';
